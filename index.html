<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO & Metadata -->
    <title>ContentFlow Pro - AI-Powered Content Automation Platform</title>
    <meta name="description" content="Streamline your content creation with ContentFlow Pro. Generate ideas, write scripts, and produce videos automatically using advanced AI." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://contentflow-pro.web.app/" />
    <meta property="og:title" content="ContentFlow Pro - AI-Powered Content Automation" />
    <meta property="og:description" content="Generate ideas, write scripts, and produce videos automatically with AI." />
    <meta property="og:image" content="https://contentflow-pro.web.app/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://contentflow-pro.web.app/" />
    <meta property="twitter:title" content="ContentFlow Pro - AI-Powered Content Automation" />
    <meta property="twitter:description" content="Generate ideas, write scripts, and produce videos automatically with AI." />
    <meta property="twitter:image" content="https://contentflow-pro.web.app/og-image.png" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
